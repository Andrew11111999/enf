line-length = 100
target-version = "py312"

[lint]
select = [
  "E",  # pycodestyle errors
  "F",  # pyflakes
  "I",  # isort
  "B",  # bugbear
  "UP", # pyupgrade
]
ignore = [
  "E203", # whitespace before ':' (conflicts with Black-style, if used later)
]

[format]
quote-style = "single"
indent-style = "space"
line-ending = "lf"

